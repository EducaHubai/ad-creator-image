<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="4 · 8 · 12 · 20 · 999 (pill)" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: "Lato", sans-serif; color: #202020; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { width: 80px; height: 80px; background: #F4F4F4; box-shadow: inset 0 0 0 1px #E0E0E0; }
  .name { font-family: "Lato", sans-serif; font-weight: 700; font-size: 11px; }
  .val { font-family: "Lato", sans-serif; font-size: 11px; color: #666; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="name">--r-xs</div><div class="val">4px</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="name">--r-sm</div><div class="val">8px</div></div>
    <div class="cell"><div class="box" style="border-radius:12px"></div><div class="name">--r-md</div><div class="val">12px</div></div>
    <div class="cell"><div class="box" style="border-radius:20px"></div><div class="name">--r-lg</div><div class="val">20px</div></div>
    <div class="cell"><div class="box" style="border-radius:999px;width:120px;height:48px"></div><div class="name">--r-pill</div><div class="val">999px</div></div>
  </div>
</body>
</html>
