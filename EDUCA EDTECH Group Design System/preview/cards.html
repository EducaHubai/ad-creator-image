<!DOCTYPE html>
<!-- @dsCard group="Components" name="Cards" subtitle="Default + lead-card with gradient border" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #F4F4F4; font-family: "Lato", sans-serif; color: #202020; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(32,32,32,0.06); display: flex; flex-direction: column; gap: 8px; min-height: 130px; }
  .card.gradient { position: relative; }
  .card.gradient::before { content: ""; position: absolute; inset: 0; border-radius: 12px; padding: 1.5px; background: linear-gradient(90deg, #60BFB8, #2E7ABE, #244A80, #963058, #E96A73); -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none; }
  .eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #963058; }
  .title { font-family: "Rubik", sans-serif; font-weight: 500; font-size: 18px; }
  .body { font-size: 13px; line-height: 1.5; color: #666; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="eyebrow">B2C</div>
      <div class="title">Educación superior</div>
      <div class="body">Másteres y posgrados con metodología propia EDUCA LXP.</div>
    </div>
    <div class="card gradient">
      <div class="eyebrow">EDTECH</div>
      <div class="title">Inteligencia Artificial</div>
      <div class="body">Personalización del aprendizaje sin precedentes.</div>
    </div>
  </div>
</body>
</html>
