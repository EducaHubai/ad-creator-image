<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Elevation" subtitle="Four-step shadow scale" viewport="700x180" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px; background: #F4F4F4; font-family: "Lato", sans-serif; color: #202020; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 90px; height: 60px; background: #fff; border-radius: 10px; }
  .name { font-family: "Lato", sans-serif; font-weight: 700; font-size: 11px; }
  .val { font-family: "Lato", sans-serif; font-size: 10px; color: #666; text-align: center; line-height: 1.3; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="box-shadow:0 1px 2px rgba(32,32,32,0.05)"></div><div class="name">--elev-1</div><div class="val">subtle hairline</div></div>
    <div class="cell"><div class="box" style="box-shadow:0 2px 8px rgba(32,32,32,0.06)"></div><div class="name">--elev-2</div><div class="val">card default</div></div>
    <div class="cell"><div class="box" style="box-shadow:0 8px 24px rgba(32,32,32,0.10)"></div><div class="name">--elev-3</div><div class="val">hover · sticky</div></div>
    <div class="cell"><div class="box" style="box-shadow:0 16px 40px rgba(32,32,32,0.16)"></div><div class="name">--elev-4</div><div class="val">modal · hero</div></div>
  </div>
</body>
</html>
