<!DOCTYPE html>
<!-- @dsCard group="Brand" name="Parallelogram motif" subtitle="−20° skew · isologo silhouette" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Parallelogram motif</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: "Lato", sans-serif; color: #202020; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: center; }
  .demo { height: 150px; border-radius: 10px; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
  .demo.light { background: #F4F4F4; }
  .demo.dark { background: #202020; }
  .stack-skew { display: flex; flex-direction: column; gap: 6px; transform: skewX(-20deg); width: 55%; height: 70%; }
  .stack-skew div { flex: 1; }
  .meta { margin-top: 10px; font-size: 11px; color: #666; }
  .demo.dark + .meta { color: #444; }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="demo light">
        <div class="stack-skew">
          <div style="background:#202020"></div>
          <div style="background:#BABABA"></div>
        </div>
      </div>
      <div class="meta">Isologo "E" positivo · #202020 + #BABABA</div>
    </div>
    <div>
      <div class="demo dark">
        <div class="stack-skew">
          <div style="background:#FFFFFF"></div>
          <div style="background:#BABABA"></div>
        </div>
      </div>
      <div class="meta">Isologo "E" negativo · #FFFFFF + #BABABA</div>
    </div>
  </div>
</body>
</html>
