<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Color · Secondary" subtitle="Burdeos · Coral · Azul oscuro · Azul medio · Teal" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color — Secondary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: "Lato", sans-serif; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: 12px; aspect-ratio: 1 / 1.05; padding: 14px; display: flex; flex-direction: column; justify-content: space-between; color: #fff; box-shadow: 0 2px 8px rgba(32,32,32,0.06); }
  .name { font-family: "Rubik", sans-serif; font-weight: 500; font-size: 14px; line-height: 1.2; }
  .hex { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.85; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background:#963058"><div class="name">Burdeos</div><div class="hex">#963058</div></div>
    <div class="sw" style="background:#E96A73"><div class="name">Coral</div><div class="hex">#E96A73</div></div>
    <div class="sw" style="background:#244A80"><div class="name">Azul oscuro</div><div class="hex">#244A80</div></div>
    <div class="sw" style="background:#2E7ABE"><div class="name">Azul medio</div><div class="hex">#2E7ABE</div></div>
    <div class="sw" style="background:#60BFB8"><div class="name">Teal</div><div class="hex">#60BFB8</div></div>
  </div>
</body>
</html>
