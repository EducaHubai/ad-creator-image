<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary teal / gradient · Secondary outline · Tertiary black" viewport="700x230" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fff; font-family: "Lato", sans-serif; color: #202020; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; }
  .btn { font-family: "Lato", sans-serif; font-weight: 700; font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase; border: 0; border-radius: 999px; padding: 12px 28px; cursor: pointer; transition: all 200ms cubic-bezier(0.22,1,0.36,1); }
  .btn-primary-teal { background: #60BFB8; color: #fff; }
  .btn-primary-grad { background: linear-gradient(90deg, #963058 0%, #244A80 100%); color: #fff; }
  .btn-secondary { background: transparent; color: #963058; box-shadow: inset 0 0 0 1.5px #963058; }
  .btn-tertiary { background: #202020; color: #fff; }
  .lab { font-size: 10px; color: #666; letter-spacing: 0.06em; text-transform: uppercase; min-width: 64px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="lab">Primary</div><button class="btn btn-primary-teal">Quiénes somos</button><button class="btn btn-primary-grad">Comenzar ahora</button></div>
    <div class="row"><div class="lab">Secondary</div><button class="btn btn-secondary">Saber más</button></div>
    <div class="row"><div class="lab">Tertiary</div><button class="btn btn-tertiary">Acceder</button></div>
  </div>
</body>
</html>
