<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Spacing scale" subtitle="8pt grid · 4 → 96" viewport="700x260" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: "Lato", sans-serif; color: #202020; }
  .row { display: flex; align-items: center; gap: 12px; height: 18px; }
  .bar { background: #963058; height: 14px; border-radius: 2px; }
  .name { font-family: "Lato", sans-serif; font-weight: 700; font-size: 11px; width: 56px; }
  .val { font-family: "Lato", sans-serif; font-size: 11px; color: #666; width: 44px; }
  .stack { display: flex; flex-direction: column; gap: 6px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="name">--sp-1</div><div class="bar" style="width:4px"></div><div class="val">4px</div></div>
    <div class="row"><div class="name">--sp-2</div><div class="bar" style="width:8px"></div><div class="val">8px</div></div>
    <div class="row"><div class="name">--sp-3</div><div class="bar" style="width:12px"></div><div class="val">12px</div></div>
    <div class="row"><div class="name">--sp-4</div><div class="bar" style="width:16px"></div><div class="val">16px</div></div>
    <div class="row"><div class="name">--sp-5</div><div class="bar" style="width:24px"></div><div class="val">24px</div></div>
    <div class="row"><div class="name">--sp-6</div><div class="bar" style="width:32px"></div><div class="val">32px</div></div>
    <div class="row"><div class="name">--sp-7</div><div class="bar" style="width:48px"></div><div class="val">48px</div></div>
    <div class="row"><div class="name">--sp-8</div><div class="bar" style="width:64px"></div><div class="val">64px</div></div>
    <div class="row"><div class="name">--sp-9</div><div class="bar" style="width:96px"></div><div class="val">96px</div></div>
  </div>
</body>
</html>
