<!DOCTYPE html>
<!-- @dsCard group="Components" name="Icons (Lucide · substituted)" subtitle="Line · stroke 1.75 · teal in soft frame" viewport="700x160" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Icons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 22px; background: #fff; font-family: "Lato", sans-serif; color: #202020; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .icon { width: 48px; height: 48px; background: #F4F4F4; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #60BFB8; }
  .icon svg { width: 26px; height: 26px; stroke-width: 1.75; }
  .meta { margin-top: 14px; font-size: 11px; color: #666; }
</style>
</head>
<body>
  <div class="row">
    <div class="icon"><i data-lucide="graduation-cap"></i></div>
    <div class="icon"><i data-lucide="book-open"></i></div>
    <div class="icon"><i data-lucide="users"></i></div>
    <div class="icon"><i data-lucide="globe"></i></div>
    <div class="icon"><i data-lucide="cpu"></i></div>
    <div class="icon"><i data-lucide="award"></i></div>
    <div class="icon"><i data-lucide="play"></i></div>
    <div class="icon"><i data-lucide="search"></i></div>
  </div>
  <div class="meta">Lucide line icons · stroke 1.75 · teal #60BFB8 · soft 8px frame</div>
  <script>lucide.createIcons();</script>
</body>
</html>
